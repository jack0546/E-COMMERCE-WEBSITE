<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ALFRED PRODUCTS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6600">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="new_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body style="background: var(--bg-light);">
    <header>
        <div class="container">
            <div class="header-top">
                <div class="logo">
                   <a href="index.html"><img src="new_logo.png" alt="ALFRED PRODUCTS Logo" style="height: 28px;"></a>
                </div>
                <div class="header-actions">
                    <a href="index.html" class="action-item">
                        <ion-icon name="home-outline"></ion-icon>
                        <span>Home</span>
                    </a>
                    <a href="cart.html" class="action-item active">
                        <ion-icon name="cart-outline"></ion-icon>
                        <span id="cartCount">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="container" style="padding: 40px 0;">
        <h2 style="margin-bottom: 30px;">Your Shopping Cart</h2>
        
        <div id="cartItemsContainer" style="display: flex; flex-direction: column; gap: 20px;">
            <!-- Cart items will be loaded here -->
        </div>

        <div id="cartSummary" style="margin-top: 40px; background: white; padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); display: none;">
            
            <!-- Delivery Form inside Cart -->
            <div class="delivery-form-container" style="margin-bottom: 30px; padding: 20px; background: #f9f9f9; border-radius: 12px; border: 1px solid #eee;">
                <h3 style="margin-bottom: 20px; font-size: 18px; color: var(--text-color);">Delivery Information</h3>
                <form id="deliveryForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                        <input type="text" id="fullName" required placeholder="Full Name" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <input type="tel" id="phoneNumber" required placeholder="Phone Number" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <input type="tel" id="whatsappNumber" placeholder="WhatsApp Number (Optional)" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                        <select id="region" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: white;">
                            <option value="">Select Region</option>
                            <option value="Greater Accra">Greater Accra</option>
                            <option value="Ashanti">Ashanti</option>
                            <option value="Central">Central</option>
                            <option value="Eastern">Eastern</option>
                            <option value="Western">Western</option>
                            <option value="Volta">Volta</option>
                            <option value="Northern">Northern</option>
                            <option value="Upper East">Upper East</option>
                            <option value="Upper West">Upper West</option>
                            <option value="Bono">Bono</option>
                            <option value="Bono East">Bono East</option>
                            <option value="Ahafo">Ahafo</option>
                            <option value="Savannah">Savannah</option>
                            <option value="North East">North East</option>
                            <option value="Oti">Oti</option>
                            <option value="Western North">Western North</option>
                        </select>
                        <input type="text" id="city" required placeholder="City / Town" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                    </div>
                    <textarea id="address" required placeholder="Delivery Address / Nearest Landmark" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; height: 80px; resize: none;"></textarea>
                </form>
            </div>

            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 18px; font-weight: 700;">
                <span>Total Amount:</span>
                <span id="cartTotalText">GHS 0.00</span>
            </div>
            <button class="btn btn-primary" onclick="validateCartAndPay()" style="width: 100%; border-radius: 8px; height: 50px; font-size: 16px;">Proceed to Payment</button>
        </div>

        <div id="emptyCartMessage" style="text-align: center; padding: 80px 0; display: none;">
            <ion-icon name="cart-outline" style="font-size: 80px; color: #ddd;"></ion-icon>
            <h3 style="margin-top: 20px; color: #999;">Your cart is empty</h3>
            <a href="index.html" class="btn btn-primary" style="display: inline-block; margin-top: 20px; text-decoration: none;">Start Shopping</a>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check for pending product from login redirect
            const pendingProductId = sessionStorage.getItem('pendingProductId');
            if (pendingProductId) {
                sessionStorage.removeItem('pendingProductId');
                // Add the product to cart
                addToCart(parseInt(pendingProductId));
            }
            renderCart();
        });

        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            const summary = document.getElementById('cartSummary');
            const emptyMsg = document.getElementById('emptyCartMessage');
            let cart = JSON.parse(localStorage.getItem('alfredCart')) || [];

            if (cart.length === 0) {
                container.innerHTML = '';
                summary.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';
            summary.style.display = 'block';
            container.innerHTML = '';

            let total = 0;

            cart.forEach((item, index) => {
                const itemPrice = parseFloat(item.price.split('-')[0].replace('GHS', '').trim());
                total += itemPrice * item.quantity;

                const itemRow = document.createElement('div');
                itemRow.className = 'order-card';
                itemRow.style.alignItems = 'center';
                itemRow.innerHTML = `
                    <div class="order-info">
                        <div class="order-img">
                            <img src="${item.image}" alt="${item.title}">
                        </div>
                        <div>
                            <h4 style="margin-bottom: 5px;">${item.title}</h4>
                            <p style="font-size: 13px; color: var(--text-muted);">Unit Price: ${item.price}</p>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div style="display: flex; align-items: center; border: 1px solid #ddd; border-radius: 5px;">
                            <button onclick="updateQty(${index}, -1)" style="padding: 5px 10px; border: none; background: none; cursor: pointer;">-</button>
                            <span style="padding: 0 10px;">${item.quantity}</span>
                            <button onclick="updateQty(${index}, 1)" style="padding: 5px 10px; border: none; background: none; cursor: pointer;">+</button>
                        </div>
                        <p style="font-weight: 700;">GHS ${(itemPrice * item.quantity).toFixed(2)}</p>
                        <ion-icon name="trash-outline" onclick="removeItem(${index})" style="color: #ff4d4d; cursor: pointer; font-size: 20px;"></ion-icon>
                    </div>
                `;
                container.appendChild(itemRow);
            });

            document.getElementById('cartTotalText').innerText = `GHS ${total.toFixed(2)}`;
            localStorage.setItem('cartTotal', total.toFixed(2));
        }

        function updateQty(index, delta) {
            let cart = JSON.parse(localStorage.getItem('alfredCart')) || [];
            cart[index].quantity += delta;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            localStorage.setItem('alfredCart', JSON.stringify(cart));
            renderCart();
            updateCartBadge();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('alfredCart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('alfredCart', JSON.stringify(cart));
            renderCart();
            updateCartBadge();
        }

        function validateCartAndPay() {
            const form = document.getElementById('deliveryForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const deliveryInfo = {
                fullName: document.getElementById('fullName').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                whatsappNumber: document.getElementById('whatsappNumber').value || 'N/A',
                region: document.getElementById('region').value,
                city: document.getElementById('city').value,
                address: document.getElementById('address').value
            };

            localStorage.setItem('tempDeliveryInfo', JSON.stringify(deliveryInfo));
            checkoutWithPaystack();
        }

        function checkoutWithPaystack() {
            const total = localStorage.getItem('cartTotal');
            const amount = parseFloat(total) * 100;
            const deliveryInfo = JSON.parse(localStorage.getItem('tempDeliveryInfo'));

            let handler = PaystackPop.setup({
                key: 'pk_live_6b9968065dc0bd4842c97ffa138e49127c862888',
                email: (auth.currentUser ? auth.currentUser.email : 'customer@alfredproducts.com'),
                amount: amount,
                currency: "GHS",
                ref: 'ORD_' + Math.floor((Math.random() * 1e9) + 1),
                metadata: {
                    custom_fields: [
                        { display_name: "Customer", value: deliveryInfo.fullName },
                        { display_name: "Phone", value: deliveryInfo.phoneNumber },
                        { display_name: "Address", value: `${deliveryInfo.address}, ${deliveryInfo.city}` }
                    ]
                },
                callback: function(res) {
                    alert('Payment Successful! Reference: ' + res.reference);
                    
                    const cart = JSON.parse(localStorage.getItem('alfredCart')) || [];
                    saveOrderToFirestore({
                        items: cart,
                        total: total,
                        reference: res.reference,
                        delivery: deliveryInfo,
                        status: 'pending'
                    });

                    localStorage.removeItem('alfredCart');
                    localStorage.removeItem('tempDeliveryInfo');
                    window.location.href = 'orders.html';
                }
            });
            handler.openIframe();
        }
    </script>
</body>
</html>
