<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Products - ALFRED PRODUCTS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6600">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #666;
            line-height: 1;
        }

        .modal-body {
            padding: 20px;
        }

        .product-info {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .product-info img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-info-details h4 {
            margin: 0 0 5px 0;
            font-size: 16px;
        }

        .product-info-details p {
            margin: 0;
            color: #0abf53;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #FF6600;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #0abf53;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #089e47;
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <div class="header-top">
                <div class="logo"><a href="index.html"><img src="1.png" alt="ALFRED PRODUCTS Logo" style="height: 28px;"></a></div>
                <div class="header-actions">
                    <a href="login.html" class="action-item"><ion-icon name="person-outline"></ion-icon><span>Sign In</span></a>
                    <a href="messages.html" class="action-item"><ion-icon name="mail-outline"></ion-icon><span>Messages</span></a>
                    <a href="orders.html" class="action-item"><ion-icon name="cart-outline"></ion-icon><span>Orders</span></a>
                </div>
            </div>
            <nav>
                <ul>
                    <li><a href="categories.html">All Categories</a></li>
                    <li><a href="featured.html" class="active">Featured Products</a></li>
                    <li><a href="trade.html">Trade Assurance</a></li>
                    <li><a href="logistics.html">Logistics Services</a></li>
                    <li><a href="help.html">Help Center</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div style="margin-top: 20px; border-radius: 12px; overflow: hidden; position: relative; height: 350px;">
            <img src="images/banners/home.jpg" alt="Featured Banner" style="width: 100%; height: 100%; object-fit: cover;">
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: center; padding: 60px; color: white;">
                <h1 style="font-size: 48px; margin-bottom: 10px;">Featured Products</h1>
                <p style="font-size: 20px;">Discover our handpicked selection of premium products</p>
            </div>
        </div>

        <section class="products">
            <h2 class="section-title">Featured Products</h2>
            <div class="product-grid" id="productGrid">
                <!-- Products will be loaded here by script.js -->
            </div>
        </section>
    </main>

    <!-- Delivery Form Modal -->
    <div id="deliveryModal" style="display:none;position:fixed;z-index:9999;left:0;top:0;width:100%;height:100%;background-color:rgba(0,0,0,0.5);">
        <div style="background-color:#fefefe;margin:5% auto;padding:25px;border:1px solid #888;width:90%;max-width:500px;border-radius:10px;">
            <span onclick="closeDeliveryModal()" style="float:right;font-size:28px;font-weight:bold;cursor:pointer;">&times;</span>
            <h2>Delivery Information</h2>
            <form id="deliveryForm" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="productCategory">
                <input type="hidden" id="productTitle">
                <input type="hidden" id="productPrice">
                <input type="hidden" id="productDescription">
                <input type="hidden" id="productImage">
                <div style="margin-bottom:15px;">
                    <label style="display:block;margin-bottom:5px;font-weight:bold;">Full Name</label>
                    <input type="text" id="fullName" required style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block;margin-bottom:5px;font-weight:bold;">Phone Number</label>
                    <input type="tel" id="phoneNumber" required style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block;margin-bottom:5px;font-weight:bold;">Delivery Address</label>
                    <textarea id="deliveryAddress" required rows="3" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;"></textarea>
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block;margin-bottom:5px;font-weight:bold;">Quantity</label>
                    <input type="number" id="quantity" value="1" min="1" required style="width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block;margin-bottom:5px;font-weight:bold;">Product</label>
                    <div id="modalProductInfo" style="background:#f9f9f9;padding:10px;border-radius:5px;"></div>
                </div>
                <button type="submit" style="width:100%;padding:15px;background:#0abf53;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">Make Payment</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Current product for payment
        let currentProduct = null;
        
        function openDeliveryForm(category, title, price, desc, image) {
            currentProduct = { category, title, price, desc, image };
            
            const modal = document.getElementById('deliveryModal');
            if (modal) {
                document.getElementById('modalProductImg').src = image;
                document.getElementById('modalProductTitle').textContent = title + ' - ' + category;
                document.getElementById('modalProductPrice').textContent = 'GHS ' + parseFloat(price).toFixed(2);
            }
            
            // Set hidden form values
            document.getElementById('productCategory').value = category;
            document.getElementById('productTitle').value = title;
            document.getElementById('productPrice').value = price;
            document.getElementById('productDescription').value = desc;
            document.getElementById('productImage').value = image;
            
            const modalProductInfo = document.getElementById('modalProductInfo');
            if (modalProductInfo) {
                modalProductInfo.innerHTML = `
                    <img src="${image}" style="width:60px;height:60px;object-fit:cover;border-radius:4px;float:left;margin-right:10px;">
                    <div>
                        <strong>${title}</strong><br>
                        <span style="color:#0abf53;">GHS ${parseFloat(price).toFixed(2)}</span>
                    </div>
                `;
            }
            
            const modalEl = document.getElementById('deliveryModal');
            if (modalEl) {
                modalEl.style.display = 'block';
            }
        }

        function closeDeliveryModal() {
            const modalEl = document.getElementById('deliveryModal');
            if (modalEl) {
                modalEl.style.display = 'none';
            }
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modalEl = document.getElementById('deliveryModal');
            if (event.target == modalEl) {
                modalEl.style.display = 'none';
            }
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phoneNumber').value;
            const address = document.getElementById('deliveryAddress').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const price = parseFloat(document.getElementById('productPrice').value);
            const total = price * quantity;
            
            // Store order in localStorage
            const order = {
                id: Date.now(),
                product: currentProduct,
                customer: { fullName, phone, address },
                quantity,
                total,
                date: new Date().toISOString(),
                status: 'pending'
            };
            
            const orders = JSON.parse(localStorage.getItem('alfred_orders') || '[]');
            orders.push(order);
            localStorage.setItem('alfred_orders', JSON.stringify(orders));
            
            // Initialize Paystack payment
            if (typeof PaystackPop !== 'undefined') {
                const handler = PaystackPop.setup({
                    key: 'pk_test_1234567890', // Replace with actual key
                    email: 'customer@example.com',
                    amount: total * 100, // Convert to kobo
                    currency: 'GHS',
                    ref: 'ALF_' + Date.now(),
                    callback: function(response) {
                        alert('Payment successful! Reference: ' + response.reference);
                        closeDeliveryModal();
                        document.getElementById('deliveryForm').reset();
                    },
                    onClose: function() {
                        alert('Payment window closed');
                    }
                });
                handler.openIframe();
            } else {
                alert('Order placed successfully! Order ID: ' + order.id);
                closeDeliveryModal();
                document.getElementById('deliveryForm').reset();
            }
        }
    </script>
</body>

</html>
