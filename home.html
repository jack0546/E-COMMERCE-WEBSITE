<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home & Garden - ALFRED PRODUCTS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6600">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>

<body>
    <header>
        <div class="container">
            <div class="header-top">
                <div class="logo"><a href="index.html"><a href="index.html"><img src="1.png" alt="ALFRED PRODUCTS Logo"
                                style="height: 28px;"></a></a></div>
                <div class="header-actions">
                    <a href="login.html" class="action-item"><ion-icon name="person-outline"></ion-icon><span>Sign
                            In</span></a>
                    <a href="messages.html" class="action-item"><ion-icon
                            name="mail-outline"></ion-icon><span>Messages</span></a>
                    <a href="orders.html" class="action-item"><ion-icon
                            name="cart-outline"></ion-icon><span>Orders</span></a>
                </div>
            </div>
            <nav>
                <ul>
                    <li><a href="categories.html">All Categories</a></li>
                    <li><a href="featured.html">Featured Products</a></li>
                    <li><a href="trade.html">Trade Assurance</a></li>
                    <li><a href="logistics.html">Logistics Services</a></li>
                    <li><a href="help.html">Help Center</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div style="margin-top: 20px; border-radius: 12px; overflow: hidden; position: relative; height: 350px;">
            <img src="images/banners/home.jpg" alt="Home Banner" style="width: 100%; height: 100%; object-fit: cover;">
            <div
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; justify-content: center; padding: 60px; color: white;">
                <h1 style="font-size: 48px; margin-bottom: 10px; color: #333;">Home & Garden</h1>
                <p style="font-size: 20px; color: #555;">Transform spaces with premium furniture and decor.</p>
            </div>
        </div>

        <section class="products">
            <h2 class="section-title">Home Essentials</h2>
            <div class="product-grid" id="productGrid">
                <!-- script.js -->
            </div>
        </section>
    </main>
    <script src="script.js"></script>
    <script>
        // Current product for payment
        let currentProduct = null;
        
        function openDeliveryForm(category, title, price, desc, image) {
            currentProduct = { category, title, price, desc, image };
            
            const modal = document.getElementById('deliveryModal');
            if (modal) {
                document.getElementById('modalProductImg').src = image;
                document.getElementById('modalProductTitle').textContent = title + ' - ' + category;
                document.getElementById('modalProductPrice').textContent = 'GHS ' + parseFloat(price).toFixed(2);
                document.getElementById('modalProductDesc').textContent = desc;
                modal.style.display = 'flex';
            }
        }
        
        function closeDeliveryForm() {
            const modal = document.getElementById('deliveryModal');
            if (modal) {
                modal.style.display = 'none';
            }
            currentProduct = null;
        }
    </script>

    <!-- Delivery Form Modal -->
    <div class="modal-overlay" id="deliveryModal"
        style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: white; border-radius: 16px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto;">
            <div style="padding: 20px; border-bottom: 1px solid #e5e5e5; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="font-size: 18px; color: #1a1a1a;">Complete Your Order</h3>
                <button onclick="closeDeliveryForm()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #8e8e8e;">&times;</button>
            </div>
            <div style="padding: 20px;">
                <div style="display: flex; gap: 15px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #e5e5e5;">
                    <img id="modalProductImg" src="" alt="Product" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                    <div>
                        <h4 id="modalProductTitle" style="font-size: 14px; margin-bottom: 5px;">Product Title</h4>
                        <div id="modalProductPrice" style="font-size: 18px; font-weight: 700; color: #0abf53;">GHS 0.00</div>
                        <p id="modalProductDesc" style="font-size: 12px; color: #8e8e8e; margin-top: 5px;">Description</p>
                    </div>
                </div>
                <form>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px;">Full Name *</label>
                        <input type="text" id="fullName" required placeholder="Your full name" style="width: 100%; padding: 12px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 14px;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px;">Phone Number *</label>
                        <input type="tel" id="phoneNumber" required placeholder="0500000000" style="width: 100%; padding: 12px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 14px;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px;">Delivery Address *</label>
                        <input type="text" id="address" required placeholder="Your delivery address" style="width: 100%; padding: 12px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 14px;">
                    </div>
                    <button type="button" onclick="alert('Order placed successfully!'); closeDeliveryForm();" style="width: 100%; padding: 15px; background: #0abf53; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">Place Order</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
