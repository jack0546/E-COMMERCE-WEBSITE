<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - ALFRED PRODUCTS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6600">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>

<body>
    <header>
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <a href="index.html"><img src="1.png" alt="ALFRED PRODUCTS Logo" style="height: 28px;"></a>
                </div>
                <div class="header-actions" id="userHeaderActions">
                    <!-- Dynamic User Header -->
                </div>
            </div>
        </div>
    </header>

    <main class="container dashboard-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>Your Purchase History</h2>
            <button class="btn btn-outline" onclick="auth.signOut().then(() => window.location.reload())" id="logoutBtn"
                style="display: none;">Logout</button>
        </div>

        <div id="ordersContainer">
            <div style="text-align: center; padding: 40px; color: var(--text-muted);">
                <ion-icon name="sync-outline" style="font-size: 40px; animation: rotate 2s linear infinite;"></ion-icon>
                <p>Loading your orders...</p>
            </div>
        </div>

        <div id="noOrdersMessage" style="display: none; text-align: center; padding: 60px 0;">
            <ion-icon name="bag-handle-outline" style="font-size: 80px; color: #eee;"></ion-icon>
            <h3 style="color: #999; margin-top: 20px;">No orders found yet.</h3>
            <a href="index.html" class="btn btn-primary"
                style="display: inline-block; margin-top: 20px; text-decoration: none;">Explore Products</a>
        </div>
    </main>

    <!-- Tracking Modal -->
    <div id="trackingModal"
        style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; justify-content: center; align-items: center;">
        <div
            style="background: white; width: 90%; max-width: 600px; border-radius: 12px; padding: 40px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2); max-height: 80vh; overflow-y: auto;">
            <span style="position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px;"
                onclick="closeTracking()">&times;</span>
            <h3 style="margin-bottom: 20px; color: var(--primary-color);">Order Details</h3>
            <div id="trackingContent">
                <!-- Delivery Info will be injected here -->
            </div>
        </div>
    </div>

    <style>
        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .order-detail-group {
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .order-detail-group:last-child {
            border-bottom: none;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #999;
            font-weight: 700;
            margin-bottom: 5px;
            display: block;
        }

        .value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
    </style>

    <script src="script.js"></script>
    <script>
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('logoutBtn').style.display = 'block';
                fetchUserOrders(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        function fetchUserOrders(uid) {
            const container = document.getElementById('ordersContainer');
            const noMsg = document.getElementById('noOrdersMessage');

            db.collection("orders").where("userId", "==", uid).orderBy("timestamp", "desc").get()
                .then((querySnapshot) => {
                    container.innerHTML = '';
                    if (querySnapshot.empty) {
                        noMsg.style.display = 'block';
                        return;
                    }

                    querySnapshot.forEach((doc) => {
                        const order = doc.data();
                        const date = order.timestamp ? order.timestamp.toDate().toLocaleDateString() : 'Just now';
                        const firstItem = order.items[0];

                        const orderDiv = document.createElement('div');
                        orderDiv.className = 'order-card';
                        orderDiv.style.marginBottom = '20px';
                        orderDiv.innerHTML = `
                            <div class="order-info">
                                <div class="order-img">
                                    <img src="${firstItem.image || 'https://via.placeholder.com/60'}" alt="Product">
                                </div>
                                <div>
                                    <h4 style="margin-bottom: 5px;">Order #${order.reference}</h4>
                                    <p style="font-size: 13px; color: var(--text-muted);">${order.items.length} item(s) purchased on ${date}</p>
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <span class="status-badge" style="background: #e6ffed; color: #1e7e34; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;">Paid</span>
                                <p style="font-size: 16px; font-weight: 700; margin-top: 10px;">GHS ${parseFloat(order.total).toFixed(2)}</p>
                                <button class="btn btn-outline" style="padding: 8px 15px; font-size: 12px; margin-top: 10px;" onclick="showTracking('${doc.id}')">View Details</button>
                            </div>
                        `;
                        container.appendChild(orderDiv);
                    });
                })
                .catch((error) => {
                    console.error("Error fetching orders: ", error);
                    container.innerHTML = '<p style="text-align: center; color: red;">Error loading orders.</p>';
                });
        }

        function showTracking(docId) {
            const modal = document.getElementById('trackingModal');
            const content = document.getElementById('trackingContent');
            modal.style.display = 'flex';
            content.innerHTML = '<p style="text-align:center;">Fetching details...</p>';

            db.collection("orders").doc(docId).get().then(doc => {
                if (doc.exists) {
                    const order = doc.data();
                    const delivery = order.delivery || {};
                    const date = order.timestamp ? order.timestamp.toDate().toLocaleString() : 'Just now';

                    content.innerHTML = `
                        <div class="order-detail-group">
                            <span class="label">Payment Status</span>
                            <span class="value" style="color: #28a745; font-weight: 700;">Completed (Ref: ${order.reference})</span>
                        </div>
                        <div class="order-detail-group">
                            <span class="label">Delivery Address</span>
                            <span class="value">${delivery.fullName || 'N/A'}<br>
                            ${delivery.address || 'No address'}<br>
                            ${delivery.city || ''}, ${delivery.region || ''}</span>
                        </div>
                        <div class="order-detail-group">
                            <span class="label">Contact Info</span>
                            <span class="value">Phone: ${delivery.phoneNumber || 'N/A'}<br>
                            WhatsApp: ${delivery.whatsappNumber || 'N/A'}</span>
                        </div>
                        <div class="order-detail-group">
                            <span class="label">Ordered Items</span>
                            <span class="value" style="font-size: 12px;">${order.items.map(item => `${item.title} (x${item.quantity})`).join('<br>')}</span>
                        </div>
                        <div class="order-detail-group" style="text-align: right;">
                            <span class="label">Purchase Date</span>
                            <span class="value" style="color: #999;">${date}</span>
                        </div>
                    `;
                }
            });
        }

        function closeTracking() {
            document.getElementById('trackingModal').style.display = 'none';
        }
    </script>
</body>

</html>
