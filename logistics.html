<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ALFRED</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0abf53">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="new_logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>

<body>
    <!-- Auth Page -->
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" style="display: inline-block; margin-bottom: 24px;">
                    <img src="new_logo.png" alt="ALFRED" style="height: 40px;">
                </a>
                <h1>Welcome back</h1>
                <p>Sign in to continue to ALFRED</p>
            </div>

            <button class="btn btn-outline" onclick="signInWithGoogle()"
                style="width: 100%; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px;">
                <ion-icon name="logo-google" style="font-size: 20px; color: #4285F4;"></ion-icon> Continue with Google
            </button>

            <div style="text-align: center; position: relative; margin: 24px 0;">
                <hr style="border: none; border-top: 1px solid var(--border-color);">
                <span
                    style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg-primary); padding: 0 12px; font-size: 12px; color: var(--text-muted);">or
                    sign in with email</span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer;">
                        <input type="checkbox" style="width: 16px; height: 16px;"> Remember me
                    </label>
                    <a href="#" style="font-size: 14px; color: var(--primary-color); font-weight: 500;">Forgot
                        password?</a>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; border-radius: 8px; padding: 14px;">Sign In</button>
            </form>

            <div class="auth-footer" style="margin-top: 24px;">
                Don't have an account? <a href="register.html">Create one</a>
            </div>
        </div>
    </div>

    <script>
        // Get redirect URL from query params
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect') || 'index.html';
        const productId = urlParams.get('productId');
        
        // Login with email and password
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // If there's a productId, add to cart first
                    if (productId) {
                        // Store the product ID to add after login
                        sessionStorage.setItem('pendingProductId', productId);
                    }
                    window.location.href = redirectUrl;
                })
                .catch((error) => {
                    alert('Login failed: ' + error.message);
                });
        }

        // Login with Google
        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    // If there's a productId, add to cart first
                    if (productId) {
                        sessionStorage.setItem('pendingProductId', productId);
                    }
                    window.location.href = redirectUrl;
                })
                .catch((error) => {
                    alert('Google sign-in failed: ' + error.message);
                });
        }
        
        // Check if there's a pending product to add after login
        document.addEventListener('DOMContentLoaded', function() {
            const pendingProductId = sessionStorage.getItem('pendingProductId');
            if (pendingProductId && window.location.pathname.includes('cart.html')) {
                sessionStorage.removeItem('pendingProductId');
                // Add the product to cart
                if (typeof addToCart === 'function') {
                    addToCart(parseInt(pendingProductId));
                    location.reload();
                }
            }
        });
    </script>
</body>

</html>
