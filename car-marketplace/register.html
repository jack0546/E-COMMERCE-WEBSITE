<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your AutoGhana account to buy, sell, and finance cars.">
  <title>Register - AutoGhana</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="headerContainer"></div>

  <div class="auth-page">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Join AutoGhana to buy and sell cars</p>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="regPhone" placeholder="+233 XX XXX XXXX">
        </div>

        <div class="form-group">
          <label>Location</label>
          <select id="regLocation">
            <option value="">Select location</option>
            <option value="Accra">Accra</option>
            <option value="Kumasi">Kumasi</option>
            <option value="Tema">Tema</option>
            <option value="Tamale">Tamale</option>
            <option value="Takoradi">Takoradi</option>
            <option value="Cape Coast">Cape Coast</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
            <button type="button" class="toggle-password" onclick="togglePass('regPassword')">&#128065;</button>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="regConfirm" placeholder="Confirm password" required>
            <button type="button" class="toggle-password" onclick="togglePass('regConfirm')">&#128065;</button>
          </div>
        </div>

        <div class="error" id="registerError" style="margin-bottom:16px;text-align:center"></div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="regBtn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="js/database/db.js"></script>
  <script src="js/security/security.js"></script>
  <script src="js/database/seed.js"></script>
  <script src="js/auth/auth.js"></script>
  <script src="js/messaging/messaging.js"></script>
  <script src="js/installment/installment.js"></script>
  <script src="js/ui/ui.js"></script>
  <script>
    document.getElementById('headerContainer').innerHTML = UI.getHeaderHTML('');

    async function initRegister() {
      await UI.initPage('');
      const authed = await Auth.isAuthenticated();
      if (authed) window.location.href = 'dashboard.html';
    }

    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const location = document.getElementById('regLocation').value;
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      const btn = document.getElementById('regBtn');
      const errEl = document.getElementById('registerError');

      errEl.textContent = '';

      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        await Auth.register({ fullName: name, email, password, phone, location });
        UI.toast('Account created successfully!', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
      } catch (err) {
        errEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    function togglePass(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    initRegister();
  </script>
</body>
</html>
