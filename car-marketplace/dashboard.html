<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your AutoGhana Dashboard - Manage your cars, orders, and messages.">
  <title>Dashboard - AutoGhana</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="headerContainer"></div>

  <div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar" id="dashSidebar">
      <div class="dash-user-info">
        <div class="dash-avatar" id="dashAvatar"></div>
        <div class="dash-user-name" id="dashName"></div>
        <div class="dash-user-role" id="dashRole"></div>
      </div>
      <nav class="dash-nav">
        <a href="#" class="active" onclick="showTab('overview',this)">&#127968; Overview</a>
        <a href="#" onclick="showTab('wishlist',this)">&#9829; Saved Cars</a>
        <a href="#" onclick="showTab('orders',this)">&#128230; My Orders</a>
        <a href="#" onclick="showTab('installments',this)">&#128176; Installments</a>
        <a href="#" onclick="showTab('messages',this)">&#9993; Messages <span id="msgBadge" class="badge badge-primary" style="margin-left:auto;display:none">0</span></a>
        <a href="#" onclick="showTab('profile',this)">&#128100; Profile</a>
        <a href="#" onclick="handleLogout()" style="color:var(--danger)">&#10140; Logout</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
      <button class="dash-mobile-toggle" onclick="toggleDashSidebar()">&#9776; Menu</button>

      <!-- Overview Tab -->
      <div class="tab-content active" id="tab-overview">
        <div class="dash-header">
          <h1>Welcome, <span id="welcomeName"></span>!</h1>
        </div>
        <div class="dash-stats">
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(230,57,70,0.1);color:var(--primary)">&#9829;</div>
            <div class="stat-value" id="statWishlist">0</div>
            <div class="stat-label">Saved Cars</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(42,157,143,0.1);color:var(--success)">&#128230;</div>
            <div class="stat-value" id="statOrders">0</div>
            <div class="stat-label">Orders</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(244,162,97,0.1);color:var(--accent)">&#128176;</div>
            <div class="stat-value" id="statInstallments">0</div>
            <div class="stat-label">Installment Plans</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:rgba(69,123,157,0.1);color:var(--secondary-light)">&#9993;</div>
            <div class="stat-value" id="statMessages">0</div>
            <div class="stat-label">Messages</div>
          </div>
        </div>
        <h3 style="font-weight:700;margin-bottom:16px">Recent Saved Cars</h3>
        <div class="cars-grid" id="overviewWishlist" style="grid-template-columns:repeat(auto-fill,minmax(240px,1fr))"></div>
      </div>

      <!-- Wishlist Tab -->
      <div class="tab-content" id="tab-wishlist">
        <div class="dash-header"><h1>Saved Cars</h1></div>
        <div class="cars-grid" id="wishlistGrid"></div>
      </div>

      <!-- Orders Tab -->
      <div class="tab-content" id="tab-orders">
        <div class="dash-header"><h1>My Orders</h1></div>
        <div id="ordersContent"></div>
      </div>

      <!-- Installments Tab -->
      <div class="tab-content" id="tab-installments">
        <div class="dash-header"><h1>Installment Plans</h1></div>
        <div id="installmentsContent"></div>
      </div>

      <!-- Messages Tab -->
      <div class="tab-content" id="tab-messages">
        <div class="dash-header"><h1>Messages</h1></div>
        <div id="chatContainer"></div>
      </div>

      <!-- Profile Tab -->
      <div class="tab-content" id="tab-profile">
        <div class="dash-header"><h1>My Profile</h1></div>
        <div class="admin-car-form" style="max-width:600px">
          <form onsubmit="updateProfile(event)">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="profName" required>
            </div>
            <div class="form-group">
              <label>Email (cannot change)</label>
              <input type="email" id="profEmail" disabled>
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" id="profPhone">
            </div>
            <div class="form-group">
              <label>Location</label>
              <select id="profLocation">
                <option value="">Select</option>
                <option value="Accra">Accra</option>
                <option value="Kumasi">Kumasi</option>
                <option value="Tema">Tema</option>
                <option value="Tamale">Tamale</option>
                <option value="Takoradi">Takoradi</option>
                <option value="Cape Coast">Cape Coast</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary">Update Profile</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="js/database/db.js"></script>
  <script src="js/security/security.js"></script>
  <script src="js/database/seed.js"></script>
  <script src="js/auth/auth.js"></script>
  <script src="js/messaging/messaging.js"></script>
  <script src="js/installment/installment.js"></script>
  <script src="js/ui/ui.js"></script>
  <script>
    document.getElementById('headerContainer').innerHTML = UI.getHeaderHTML('');

    let currentUser = null;
    let activeConvoId = null;

    async function init() {
      await UI.initPage('');
      if (!await Auth.requireAuth()) return;

      currentUser = await Auth.getCurrentUser();
      if (currentUser.role === 'admin') { window.location.href = 'admin.html'; return; }

      document.getElementById('dashAvatar').textContent = UI.getInitials(currentUser.fullName);
      document.getElementById('dashName').textContent = currentUser.fullName;
      document.getElementById('dashRole').textContent = 'Member';
      document.getElementById('welcomeName').textContent = currentUser.fullName.split(' ')[0];

      // Profile
      document.getElementById('profName').value = currentUser.fullName;
      document.getElementById('profEmail').value = currentUser.email;
      document.getElementById('profPhone').value = currentUser.phone || '';
      document.getElementById('profLocation').value = currentUser.location || '';

      await loadOverview();
      await loadUnreadBadge();
    }

    async function loadOverview() {
      const wishlist = await CarDB.getByIndex('wishlist', 'userId', currentUser.id);
      const orders = await CarDB.getByIndex('orders', 'userId', currentUser.id);
      const plans = await Installment.getUserPlans(currentUser.id);
      const convos = await Messaging.getUserConversations(currentUser.id);
      let msgCount = 0;
      for (const c of convos) { const msgs = await Messaging.getMessages(c.id); msgCount += msgs.length; }

      document.getElementById('statWishlist').textContent = wishlist.length;
      document.getElementById('statOrders').textContent = orders.length;
      document.getElementById('statInstallments').textContent = plans.length;
      document.getElementById('statMessages').textContent = msgCount;

      // Recent wishlist cars
      const grid = document.getElementById('overviewWishlist');
      if (wishlist.length === 0) {
        grid.innerHTML = '<div class="empty-state"><h3>No saved cars yet</h3><p><a href="inventory.html" style="color:var(--primary)">Browse inventory</a> to find cars you like</p></div>';
      } else {
        const carPromises = wishlist.slice(0, 4).map(w => CarDB.get('cars', w.carId));
        const cars = (await Promise.all(carPromises)).filter(Boolean);
        grid.innerHTML = cars.map(c => UI.createCarCard(c)).join('');
      }
    }

    async function loadUnreadBadge() {
      const count = await Messaging.getUnreadCount(currentUser.id, 'user');
      const badge = document.getElementById('msgBadge');
      if (count > 0) { badge.style.display = ''; badge.textContent = count; }
      else { badge.style.display = 'none'; }
    }

    function showTab(tabName, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.dash-nav a').forEach(a => a.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');
      if (el) el.classList.add('active');

      // Close mobile sidebar
      document.getElementById('dashSidebar').classList.remove('mobile-open');

      if (tabName === 'wishlist') loadWishlist();
      if (tabName === 'orders') loadOrders();
      if (tabName === 'installments') loadInstallments();
      if (tabName === 'messages') loadMessages();
    }

    async function loadWishlist() {
      const wishlist = await CarDB.getByIndex('wishlist', 'userId', currentUser.id);
      const grid = document.getElementById('wishlistGrid');
      if (wishlist.length === 0) {
        grid.innerHTML = '<div class="empty-state"><h3>No saved cars</h3><p>Browse our <a href="inventory.html" style="color:var(--primary)">inventory</a> and save cars you like</p></div>';
        return;
      }
      const carPromises = wishlist.map(w => CarDB.get('cars', w.carId));
      const cars = (await Promise.all(carPromises)).filter(Boolean);
      grid.innerHTML = cars.map(c => UI.createCarCard(c)).join('');
    }

    async function loadOrders() {
      const orders = await CarDB.getByIndex('orders', 'userId', currentUser.id);
      const el = document.getElementById('ordersContent');
      if (orders.length === 0) {
        el.innerHTML = '<div class="empty-state"><h3>No orders yet</h3><p>Your purchase history will appear here</p></div>';
        return;
      }
      el.innerHTML = `<table class="dash-table"><thead><tr><th>Car</th><th>Price</th><th>Status</th><th>Date</th></tr></thead><tbody>
        ${orders.map(o => `<tr><td>${o.carTitle || 'Car'}</td><td>${UI.formatPrice(o.amount)}</td><td><span class="badge badge-${o.status === 'completed' ? 'success' : 'warning'}">${o.status}</span></td><td>${UI.formatDate(o.createdAt)}</td></tr>`).join('')}
      </tbody></table>`;
    }

    async function loadInstallments() {
      const plans = await Installment.getUserPlans(currentUser.id);
      const el = document.getElementById('installmentsContent');
      if (plans.length === 0) {
        el.innerHTML = '<div class="empty-state"><h3>No installment plans</h3><p>Apply for an installment plan on any car details page</p></div>';
        return;
      }
      el.innerHTML = `<table class="dash-table"><thead><tr><th>Car</th><th>Down Payment</th><th>Monthly</th><th>Duration</th><th>Status</th></tr></thead><tbody>
        ${plans.map(p => `<tr>
          <td>${p.carTitle}</td>
          <td>${UI.formatPrice(p.downPayment)}</td>
          <td>${UI.formatPrice(p.monthlyPayment)}</td>
          <td>${p.months} months</td>
          <td><span class="badge badge-${p.status === 'approved' ? 'success' : p.status === 'rejected' ? 'danger' : 'warning'}">${p.status}</span></td>
        </tr>`).join('')}
      </tbody></table>`;
    }

    async function loadMessages() {
      const container = document.getElementById('chatContainer');
      const convo = await Messaging.getOrCreateConversation(currentUser.id);
      activeConvoId = convo.id;
      await Messaging.markAsRead(convo.id, 'user');
      await loadUnreadBadge();

      const messages = await Messaging.getMessages(convo.id);

      container.innerHTML = `
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;height:500px;display:flex;flex-direction:column">
          <div class="chat-header">
            <div class="chat-item-avatar" style="width:36px;height:36px;font-size:0.8rem">A</div>
            <div><div class="chat-item-name">AutoGhana Support</div><div style="font-size:0.75rem;color:var(--text-secondary)"><span class="status-dot online"></span>Online</div></div>
          </div>
          <div class="chat-messages" id="chatMessages">
            ${messages.length === 0 ? '<div class="empty-state" style="padding:40px"><p>Start a conversation with our team</p></div>' :
              messages.map(m => `
                <div class="chat-message ${m.senderRole === 'user' ? 'sent' : 'received'}">
                  <div>
                    <div class="chat-message-bubble">${m.text}</div>
                    <div class="chat-message-time">${UI.formatTime(m.timestamp)} ${m.seen ? '&#10003;&#10003;' : '&#10003;'}</div>
                  </div>
                </div>
              `).join('')
            }
          </div>
          <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()">
            <button onclick="sendChat()">&#10148;</button>
          </div>
        </div>
      `;

      const msgArea = document.getElementById('chatMessages');
      msgArea.scrollTop = msgArea.scrollHeight;
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !activeConvoId) return;
      input.value = '';
      await Messaging.sendMessage(activeConvoId, currentUser.id, 'user', text);
      await loadMessages();
    }

    async function updateProfile(e) {
      e.preventDefault();
      try {
        await Auth.updateProfile({
          fullName: document.getElementById('profName').value.trim(),
          phone: document.getElementById('profPhone').value.trim(),
          location: document.getElementById('profLocation').value
        });
        UI.toast('Profile updated!', 'success');
        currentUser = await Auth.getCurrentUser();
        document.getElementById('dashAvatar').textContent = UI.getInitials(currentUser.fullName);
        document.getElementById('dashName').textContent = currentUser.fullName;
      } catch (e) {
        UI.toast(e.message, 'error');
      }
    }

    function handleLogout() {
      Auth.logout();
      window.location.href = 'index.html';
    }

    function toggleDashSidebar() {
      document.getElementById('dashSidebar').classList.toggle('mobile-open');
    }

    init();
  </script>
</body>
</html>
