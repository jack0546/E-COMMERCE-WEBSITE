<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View car details, specifications, and financing options on AutoGhana.">
  <title>Car Details - AutoGhana</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="headerContainer"></div>

  <div class="page-content">
    <div class="container">
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="separator">/</span>
        <a href="inventory.html">Inventory</a>
        <span class="separator">/</span>
        <span id="breadcrumbTitle">Loading...</span>
      </div>

      <div class="car-details-layout" id="carDetailsContent">
        <!-- Left Column -->
        <div>
          <!-- Gallery -->
          <div class="car-gallery">
            <div class="gallery-main" id="galleryMain">
              <div class="skeleton skeleton-image" style="height:450px"></div>
            </div>
            <div class="gallery-thumbs" id="galleryThumbs"></div>
          </div>

          <!-- Specs Table -->
          <div class="specs-section">
            <div class="specs-table">
              <div class="specs-table-header">Vehicle Specifications</div>
              <div id="specsBody"></div>
            </div>
          </div>

          <!-- Description -->
          <div style="margin-top:24px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px">
            <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:12px">Description</h3>
            <p id="carDescription" style="color:var(--text-secondary);line-height:1.8"></p>
          </div>
        </div>

        <!-- Right Column - Info Card -->
        <div>
          <div class="car-info-card">
            <h1 class="car-info-title" id="carTitle"></h1>
            <div class="car-info-price" id="carPrice"></div>
            <div class="car-info-installment" id="carInstallment"></div>

            <div class="car-info-actions">
              <button class="btn btn-primary w-full" onclick="requestInspection()">&#128269; Request Inspection</button>
              <button class="btn btn-secondary w-full" onclick="messageSeller()">&#9993; Message Seller</button>
              <button class="btn btn-outline w-full" id="wishlistBtn" onclick="toggleDetailWishlist()">&#9825; Save to Wishlist</button>
            </div>

            <div class="car-info-meta" id="carMeta"></div>
          </div>

          <!-- Installment Calculator -->
          <div class="installment-calc">
            <h3>Installment Calculator</h3>
            <div class="form-group">
              <label>Down Payment (GHS)</label>
              <input type="number" id="calcDown" placeholder="Enter down payment" oninput="calculateInstallment()">
            </div>
            <div class="form-group">
              <label>Duration (Months)</label>
              <select id="calcMonths" onchange="calculateInstallment()">
                <option value="6">6 Months</option>
                <option value="12" selected>12 Months</option>
                <option value="24">24 Months</option>
                <option value="36">36 Months</option>
              </select>
            </div>
            <div class="calc-result" id="calcResult" style="display:none">
              <div class="calc-monthly" id="calcMonthly"></div>
              <p style="color:var(--text-secondary);font-size:0.85rem;margin-top:8px" id="calcDetails"></p>
              <button class="btn btn-primary btn-sm" style="margin-top:16px" onclick="applyInstallment()">Apply for this Plan</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footerContainer"></div>

  <script src="js/database/db.js"></script>
  <script src="js/security/security.js"></script>
  <script src="js/database/seed.js"></script>
  <script src="js/auth/auth.js"></script>
  <script src="js/messaging/messaging.js"></script>
  <script src="js/installment/installment.js"></script>
  <script src="js/ui/ui.js"></script>
  <script>
    document.getElementById('headerContainer').innerHTML = UI.getHeaderHTML('');
    document.getElementById('footerContainer').innerHTML = UI.getFooterHTML();

    let currentCar = null;
    let currentImageIndex = 0;

    async function init() {
      await UI.initPage('');
      const params = new URLSearchParams(window.location.search);
      const carId = parseInt(params.get('id'));
      if (!carId) { window.location.href = 'inventory.html'; return; }

      currentCar = await CarDB.get('cars', carId);
      if (!currentCar) { window.location.href = 'inventory.html'; return; }

      renderCarDetails();
    }

    function renderCarDetails() {
      const car = currentCar;
      document.title = `${car.year} ${car.brand} ${car.model} - AutoGhana`;
      document.getElementById('breadcrumbTitle').textContent = `${car.year} ${car.brand} ${car.model}`;
      document.getElementById('carTitle').textContent = `${car.year} ${car.brand} ${car.model}`;
      document.getElementById('carPrice').textContent = UI.formatPrice(car.price);

      const monthlyEst = Installment.calculate(car.price, car.price * 0.3, 12);
      document.getElementById('carInstallment').textContent = `From ${UI.formatPrice(monthlyEst.monthly)}/month with 30% down`;
      document.getElementById('carDescription').textContent = car.description;
      document.getElementById('calcDown').value = Math.round(car.price * 0.3);

      // Gallery
      const placeholderSVG = `<svg width="600" height="450" viewBox="0 0 600 450" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="600" height="450" fill="#e8ecf1"/><g transform="translate(220,150)"><path d="M10 130h120V80c0-10 10-20 20-20h40l20-30h60l20 30h30c15 0 30 13 30 28v42h10v20H0v-20h10v-20z" fill="#a0aec0"/><circle cx="55" cy="130" r="20" fill="#718096"/><circle cx="105" cy="130" r="20" fill="#718096"/></g><text x="300" y="300" text-anchor="middle" fill="#a0aec0" font-size="18" font-family="sans-serif">${car.brand} ${car.model}</text></svg>`;

      const hasImages = car.images && car.images[0] && car.images[0] !== 'car-placeholder.svg';
      const galleryMain = document.getElementById('galleryMain');

      if (hasImages) {
        galleryMain.innerHTML = `
          <img src="assets/images/cars/${car.images[0]}" alt="${car.brand} ${car.model}" id="mainImage">
          <button class="gallery-nav gallery-prev" onclick="prevImage()">&lsaquo;</button>
          <button class="gallery-nav gallery-next" onclick="nextImage()">&rsaquo;</button>
        `;
        const thumbs = document.getElementById('galleryThumbs');
        thumbs.innerHTML = car.images.map((img, i) => `
          <div class="gallery-thumb ${i === 0 ? 'active' : ''}" onclick="setImage(${i})">
            <img src="assets/images/cars/${img}" alt="Thumb ${i+1}">
          </div>
        `).join('');
      } else {
        galleryMain.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg-alt)">${placeholderSVG}</div>`;
      }

      // Meta info
      document.getElementById('carMeta').innerHTML = `
        <div class="car-meta-row"><span class="label">Brand</span><span class="value">${car.brand}</span></div>
        <div class="car-meta-row"><span class="label">Model</span><span class="value">${car.model}</span></div>
        <div class="car-meta-row"><span class="label">Year</span><span class="value">${car.year}</span></div>
        <div class="car-meta-row"><span class="label">Mileage</span><span class="value">${Number(car.mileage).toLocaleString()} km</span></div>
        <div class="car-meta-row"><span class="label">Transmission</span><span class="value">${car.transmission}</span></div>
        <div class="car-meta-row"><span class="label">Fuel</span><span class="value">${car.fuel}</span></div>
        <div class="car-meta-row"><span class="label">Color</span><span class="value">${car.color}</span></div>
        <div class="car-meta-row"><span class="label">Location</span><span class="value">${car.location}</span></div>
        <div class="car-meta-row"><span class="label">Condition</span><span class="value">${car.condition}</span></div>
      `;

      // Specs
      const specs = car.specs || {};
      document.getElementById('specsBody').innerHTML = `
        <div class="specs-row"><span class="specs-label">Engine Size</span><span class="specs-value">${car.engineSize}</span></div>
        <div class="specs-row"><span class="specs-label">Body Type</span><span class="specs-value">${car.bodyType}</span></div>
        <div class="specs-row"><span class="specs-label">Doors</span><span class="specs-value">${car.doors}</span></div>
        <div class="specs-row"><span class="specs-label">Seats</span><span class="specs-value">${car.seats}</span></div>
        <div class="specs-row"><span class="specs-label">Horsepower</span><span class="specs-value">${specs.horsepower || 'N/A'}</span></div>
        <div class="specs-row"><span class="specs-label">Torque</span><span class="specs-value">${specs.torque || 'N/A'}</span></div>
        <div class="specs-row"><span class="specs-label">Drivetrain</span><span class="specs-value">${specs.drivetrain || 'N/A'}</span></div>
        <div class="specs-row"><span class="specs-label">Fuel Economy</span><span class="specs-value">${specs.fuelEconomy || 'N/A'}</span></div>
      `;

      calculateInstallment();
      checkWishlistStatus();
    }

    function setImage(index) {
      if (!currentCar.images || !currentCar.images[index]) return;
      currentImageIndex = index;
      document.getElementById('mainImage').src = `assets/images/cars/${currentCar.images[index]}`;
      document.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === index));
    }

    function prevImage() {
      const total = (currentCar.images || []).length;
      setImage((currentImageIndex - 1 + total) % total);
    }

    function nextImage() {
      const total = (currentCar.images || []).length;
      setImage((currentImageIndex + 1) % total);
    }

    function calculateInstallment() {
      if (!currentCar) return;
      const down = parseInt(document.getElementById('calcDown').value) || 0;
      const months = parseInt(document.getElementById('calcMonths').value);

      if (down <= 0 || down >= currentCar.price) {
        document.getElementById('calcResult').style.display = 'none';
        return;
      }

      const result = Installment.calculate(currentCar.price, down, months);
      document.getElementById('calcResult').style.display = 'block';
      document.getElementById('calcMonthly').innerHTML = `${UI.formatPrice(result.monthly)} <small>/month</small>`;
      document.getElementById('calcDetails').innerHTML = `
        Principal: ${UI.formatPrice(result.principal)} | Interest: ${UI.formatPrice(result.interest)} | Total: ${UI.formatPrice(result.total)}
      `;
    }

    async function applyInstallment() {
      const user = await Auth.getCurrentUser();
      if (!user) { window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`; return; }

      const down = parseInt(document.getElementById('calcDown').value) || 0;
      const months = parseInt(document.getElementById('calcMonths').value);

      try {
        await Installment.requestPlan(user.id, currentCar.id, down, months);
        UI.toast('Installment plan request submitted! Awaiting admin approval.', 'success');
      } catch (e) {
        UI.toast(e.message, 'error');
      }
    }

    async function requestInspection() {
      const user = await Auth.getCurrentUser();
      if (!user) { window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`; return; }

      const convo = await Messaging.getOrCreateConversation(user.id);
      await Messaging.sendMessage(convo.id, user.id, 'user', `Hi, I would like to request an inspection for: ${currentCar.year} ${currentCar.brand} ${currentCar.model} (${UI.formatPrice(currentCar.price)})`);
      UI.toast('Inspection request sent! Check your messages for a response.', 'success');
    }

    async function messageSeller() {
      const user = await Auth.getCurrentUser();
      if (!user) { window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`; return; }

      UI.showModal('Message Seller', `
        <div class="form-group">
          <label>Your Message</label>
          <textarea id="sellerMessage" rows="4" placeholder="Ask about this car..."
            style="width:100%;padding:12px;border-radius:var(--radius);background:var(--bg-alt);border:1px solid var(--border);color:var(--text);resize:vertical">Hi, I'm interested in the ${currentCar.year} ${currentCar.brand} ${currentCar.model}. Is it still available?</textarea>
        </div>
      `, `
        <button class="btn btn-ghost" onclick="UI.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="sendSellerMessage()">Send Message</button>
      `);
    }

    async function sendSellerMessage() {
      const msg = document.getElementById('sellerMessage').value.trim();
      if (!msg) return;
      const user = await Auth.getCurrentUser();
      const convo = await Messaging.getOrCreateConversation(user.id);
      await Messaging.sendMessage(convo.id, user.id, 'user', msg);
      UI.closeModal();
      UI.toast('Message sent successfully!', 'success');
    }

    async function checkWishlistStatus() {
      const user = await Auth.getCurrentUser();
      if (!user) return;
      const items = await CarDB.query('wishlist', w => w.userId === user.id && w.carId === currentCar.id);
      const btn = document.getElementById('wishlistBtn');
      if (items.length > 0) {
        btn.innerHTML = '&#9829; Saved to Wishlist';
        btn.classList.add('active');
      }
    }

    async function toggleDetailWishlist() {
      const user = await Auth.getCurrentUser();
      if (!user) { window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`; return; }
      const btn = document.getElementById('wishlistBtn');
      const items = await CarDB.query('wishlist', w => w.userId === user.id && w.carId === currentCar.id);
      if (items.length > 0) {
        await CarDB.remove('wishlist', items[0].id);
        btn.innerHTML = '&#9825; Save to Wishlist';
        btn.classList.remove('active');
        UI.toast('Removed from wishlist', 'info');
      } else {
        await CarDB.add('wishlist', { userId: user.id, carId: currentCar.id });
        btn.innerHTML = '&#9829; Saved to Wishlist';
        btn.classList.add('active');
        UI.toast('Added to wishlist!', 'success');
      }
    }

    init();
  </script>
</body>
</html>
